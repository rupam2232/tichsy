# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js server to Azure Web App - Tichsy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build server
        run: npx turbo run build --filter=server
        
      - name: Prune workspace for deployment
        run: npx turbo prune server --docker

      - name: Prepare deploy package
        run: |
          mkdir deploy
          cp -a out/json/. deploy/
          mkdir -p deploy/apps/server
          cp -a apps/server/dist deploy/apps/server/dist

      - name: Install production dependencies
        working-directory: deploy
        run: npm ci --omit=dev
        
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8718DD557E05475283FD10D5701A11B0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EFAEE7B71CC34FB7A437700AF79EF556 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_01E7E21C06B34248A91144BFD2790778 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tichsy'
          slot-name: 'Production'
          package: ./deploy
          
